backend:
  name: github
  repo: liulihan639-ai/hanfang-site
  branch: main
  site_domain: hanfang-site.vercel.app
  auth_type: implicit
publish_mode: editorial_workflow
media_folder: public/images
public_folder: /images
collections:
  - name: en
    label: "\U0001F1EC\U0001F1E7 English Content"
    folder: content/en
    create: false
    delete: false
    format: json
    extension: json
    editor:
      preview: false
    files:
      - name: hero
        label: Hero Banner
        file: content/en/hero.json
        fields:
          - name: badge
            label: Badge
            widget: string
          - name: headline
            label: Headline Start
            widget: string
          - name: headlineHighlight
            label: Headline Highlight
            widget: string
          - name: headlineSuffix
            label: Headline Suffix
            widget: string
          - name: subtitle
            label: Subtitle
            widget: text
          - name: exploreProducts
            label: 'Button: Explore Products'
            widget: string
          - name: becomePartner
            label: 'Button: Become Partner'
            widget: string
          - name: globalReach
            label: 'Label: Global Reach'
            widget: string
          - name: countries
            label: 'Label: Countries'
            widget: string
          - name: partners
            label: 'Label: Partners'
            widget: string
          - name: capacity
            label: 'Label: Capacity'
            widget: string
      - name: nav
        label: Navigation
        file: content/en/nav.json
        fields:
          - name: products
            label: Products Link
            widget: string
          - name: solutions
            label: Solutions Link
            widget: string
          - name: specs
            label: Specs Link
            widget: string
          - name: contact
            label: Contact Link
            widget: string
          - name: getInTouch
            label: 'Button: Get in Touch'
            widget: string
      - name: highlights
        label: Why Hanfang (4 Cards)
        file: content/en/highlights.json
        fields:
          - name: title
            label: Section Title
            widget: string
          - name: subtitle
            label: Section Subtitle
            widget: string
          - name: items
            label: Highlight Cards
            widget: list
            fields:
              - name: title
                label: Card Title
                widget: string
              - name: desc
                label: Card Description
                widget: text
      - name: products
        label: Product Family (3 Products)
        file: content/en/products.json
        fields:
          - name: title
            label: Section Title
            widget: string
          - name: subtitle
            label: Section Subtitle
            widget: text
          - name: requestQuote
            label: 'Button: Request Quote'
            widget: string
          - name: inquireNow
            label: 'Button: Inquire Now'
            widget: string
          - name: items
            label: Products
            widget: list
            fields:
              - name: name
                label: Product Name
                widget: string
              - name: tag
                label: Tag
                widget: string
              - name: subtitle
                label: Subtitle
                widget: string
              - name: specs
                label: Specs
                widget: list
                field:
                  name: spec
                  label: Spec
                  widget: string
              - name: points
                label: Key Points
                widget: list
                field:
                  name: point
                  label: Point
                  widget: string
      - name: usecases
        label: Use Cases
        file: content/en/usecases.json
        fields:
          - name: title
            label: Section Title
            widget: string
          - name: subtitle
            label: Section Subtitle
            widget: text
          - name: items
            label: Use Cases
            widget: list
            fields:
              - name: title
                label: Case Title
                widget: string
              - name: desc
                label: Description
                widget: text
      - name: specs
        label: Technical Specs
        file: content/en/specs.json
        fields:
          - name: title
            label: Section Title
            widget: string
          - name: subtitle
            label: Section Subtitle
            widget: text
          - name: sections
            label: Spec Sections
            widget: list
            fields:
              - name: title
                label: Section Title
                widget: string
              - name: rows
                label: Spec Rows
                widget: list
                fields:
                  - name: label
                    label: Spec Label
                    widget: string
                  - name: value
                    label: Spec Value
                    widget: string
      - name: inquiry
        label: Inquiry / Contact
        file: content/en/inquiry.json
        fields:
          - name: title
            label: Section Title
            widget: string
          - name: subtitle
            label: Section Subtitle
            widget: text
          - name: partnerTitle
            label: Partner Benefits Title
            widget: string
          - name: benefits
            label: Partner Benefits
            widget: list
            field:
              name: benefit
              label: Benefit
              widget: string
          - name: quickContact
            label: Quick Contact Title
            widget: string
          - name: formTitle
            label: Form Title
            widget: string
          - name: formSubtitle
            label: Form Subtitle
            widget: text
          - name: companyName
            label: 'Form: Company Name'
            widget: string
          - name: contactName
            label: 'Form: Contact Name'
            widget: string
          - name: email
            label: 'Form: Email'
            widget: string
          - name: country
            label: 'Form: Country/Region'
            widget: string
          - name: interestedProduct
            label: 'Form: Interested Product'
            widget: string
          - name: message
            label: 'Form: Message Placeholder'
            widget: string
          - name: submit
            label: 'Form: Submit Button'
            widget: string
          - name: demoNote
            label: Demo Note
            widget: text
          - name: emailContact
            label: Contact Email
            widget: string
          - name: phone
            label: Contact Phone
            widget: string
      - name: footer
        label: Footer
        file: content/en/footer.json
        fields:
          - name: description
            label: Description
            widget: text
          - name: quickLinks
            label: Quick Links Title
            widget: string
          - name: contact
            label: Contact Title
            widget: string
          - name: privacy
            label: Privacy Link
            widget: string
          - name: terms
            label: Terms Link
            widget: string
          - name: copyright
            label: Copyright Text
            widget: string
